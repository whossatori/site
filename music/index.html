<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>satori / music</title>
<link rel="icon" href="https://segs.lol/IEPPV1.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:          #0a0a0c;
    --card:        #111114;
    --line:        rgba(255,255,255,0.08);
    --line-strong: rgba(255,255,255,0.22);
    --glow:        rgba(255,255,255,0.06);
    --glow-strong: rgba(255,255,255,0.14);
    --text:        #f2f2f0;
    --text-dim:    #8a8a8f;
    --text-dimmer: #55555c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  body::before {
    content: "";
    position: fixed; inset: 0;
    background-image:
      radial-gradient(circle at 15% 50%, rgba(255,182,193,0.03), transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(255,255,255,0.015), transparent 40%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── layout ── */
  .page {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 80px 24px 80px;
  }

  /* ── back link ── */
  .back-link {
    position: fixed;
    top: 24px;
    left: 24px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
    color: var(--text-dimmer);
    font-size: 12px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: color 0.2s;
    z-index: 10;
  }
  .back-link:hover { color: var(--text-dim); }
  .back-link svg { width: 12px; height: 12px; }

  /* ── section headers ── */
  .section-label {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dimmer);
    margin-bottom: 14px;
  }
  .section-label.centered { text-align: center; }

  /* ── now playing pill ── */
  .now-playing-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 4px 10px 4px 8px;
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 14px;
  }
  .now-playing-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #fff;
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.75); }
  }

  /* ── recent scrobbles slider ── */
  .slider-wrap {
    position: relative;
    margin-bottom: 52px;
  }

  .slider {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    overflow-y: visible;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 4px;
    padding-left: calc((100% - (88px * 6 + 10px * 5)) / 2);
    padding-right: calc((100% - (88px * 6 + 10px * 5)) / 2);
  }
  .slider::-webkit-scrollbar { display: none; }

  .scrobble-card {
    position: relative;
    flex: 0 0 88px;
    width: 88px;
    height: 88px;
    scroll-snap-align: start;
    border-radius: 12px;
    overflow: hidden;
    cursor: default;
    z-index: 1;
    transition: flex-basis 0.25s ease, width 0.25s ease;
    display: flex;
    align-items: stretch;
  }
  .scrobble-card:hover {
    flex-basis: 248px;
    width: 248px;
    overflow: visible;
  }
  .scrobble-card:hover { z-index: 10; }

  .scrobble-card.now .scrobble-art,
  .scrobble-card.now .scrobble-art-placeholder {
    box-shadow: 0 0 0 2px rgba(255,255,255,0.28);
  }

  .scrobble-art {
    width: 88px;
    height: 88px;
    border-radius: 12px;
    object-fit: cover;
    display: block;
    background: #1a1a1e;
    flex-shrink: 0;
    transition: border-radius 0.25s ease;
  }
  .scrobble-card:hover .scrobble-art {
    border-radius: 12px 0 0 12px;
  }
  .scrobble-art-placeholder {
    width: 88px;
    height: 88px;
    border-radius: 12px;
    background: #1a1a1e;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dimmer);
    font-size: 24px;
    flex-shrink: 0;
    transition: border-radius 0.25s ease;
  }
  .scrobble-card:hover .scrobble-art-placeholder {
    border-radius: 12px 0 0 12px;
  }

  .scrobble-info {
    width: 0;
    height: 88px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0;
    background: rgba(14,14,18,0.92);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--line-strong);
    border-left: none;
    border-radius: 0 12px 12px 0;
    overflow: hidden;
    opacity: 0;
    transition: width 0.25s ease, opacity 0.2s ease, padding 0.25s ease;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .scrobble-card:hover .scrobble-info {
    width: 160px;
    opacity: 1;
    padding: 0 14px;
  }

  .scrobble-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
  }
  .scrobble-artist {
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .scrobble-time {
    font-size: 10px;
    color: var(--text-dimmer);
    margin-top: 4px;
  }

  .slider-wrap::after {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 48px;
    background: linear-gradient(to right, transparent, var(--bg));
    pointer-events: none;
    z-index: 2;
    display: none;
  }

  /* ── two column grid ── */
  .cols {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 120px;
    max-width: 680px;
    margin: 0 auto;
  }
  @media (max-width: 600px) {
    .cols { grid-template-columns: 1fr; }
  }

  .cols > div > .section-label { text-align: center; }

  /* ── top list cards ── */
  .top-list {
    display: flex;
    flex-direction: column;
    gap: 22px;
  }

  .top-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 7px 10px;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.2s, background 0.2s, transform 0.2s;
  }
  .top-item:hover {
    border-color: var(--line-strong);
    background: #141418;
    transform: translateX(3px);
  }

  .top-rank {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-dimmer);
    width: 14px;
    text-align: center;
    flex-shrink: 0;
  }

  .top-art {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    object-fit: cover;
    background: #1a1a1e;
    flex-shrink: 0;
  }
  .top-art-placeholder {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    background: #1a1a1e;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    color: var(--text-dimmer);
  }

  .top-info {
    flex: 1;
    min-width: 0;
  }
  .top-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .top-sub {
    font-size: 10px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 1px;
  }

  .top-plays {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dimmer);
    flex-shrink: 0;
    text-align: right;
  }
  .top-plays span {
    display: block;
    font-size: 9px;
    font-weight: 400;
    color: var(--text-dimmer);
  }

  /* ── skeleton loader ── */
  .skeleton {
    background: linear-gradient(90deg, #1a1a1e 25%, #222226 50%, #1a1a1e 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 8px;
  }
  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .skeleton-scrobble {
    flex: 0 0 88px;
    width: 88px;
    height: 88px;
    border-radius: 12px;
  }
  .skeleton-item {
    height: 48px;
    border-radius: 10px;
  }

  /* ── cherry blossom tree ── */
  .blossom-tree {
    position: fixed;
    left: -4px;
    bottom: 0;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    line-height: 1.15;
    letter-spacing: 0;
    white-space: pre;
    pointer-events: none;
    user-select: none;
    z-index: 0;
    opacity: 0.90;
  }
  .blossom-tree .trunk       { color: #6b4c36; }
  .blossom-tree .branch      { color: #8a6848; }
  .blossom-tree .branch-thin { color: #7a5a3e; }
  .blossom-tree .blossom     { color: #ffb7c5; text-shadow: 0 0 6px rgba(255,150,180,0.5); }
  .blossom-tree .blossom-deep{ color: #ff85a8; text-shadow: 0 0 8px rgba(255,100,160,0.6); }
  .blossom-tree .blossom-pale{ color: #ffd6e3; text-shadow: 0 0 4px rgba(255,180,210,0.4); }
  .blossom-tree .root        { color: #5a4030; }

  .petal {
    position: fixed;
    font-family: 'Courier New', monospace;
    pointer-events: none;
    user-select: none;
    z-index: 0;
    font-size: 13px;
    line-height: 1;
    will-change: transform, opacity;
    animation: drift linear forwards;
  }
  @keyframes drift {
    0%   { transform: translate(0, 0) rotate(var(--rot-start)); opacity: 0; }
    6%   { opacity: var(--petal-opacity); }
    90%  { opacity: calc(var(--petal-opacity) * 0.5); }
    100% { transform: translate(var(--drift-x), var(--drift-y)) rotate(var(--rot-end)); opacity: 0; }
  }

  #bg-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  #petal-floor {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 0;
    overflow: visible;
    pointer-events: none;
    user-select: none;
    z-index: 0;
    font-family: 'Courier New', monospace;
    line-height: 1.1;
  }
  .floor-col {
    position: absolute;
    bottom: 0;
    display: flex;
    flex-direction: column-reverse;
    align-items: center;
  }
  .floor-petal {
    display: block;
    line-height: 1;
    transition: opacity 2s ease-out;
  }
  @media (max-width: 860px) { .blossom-tree { font-size: 10px; } }
</style>
</head>
<body>
<div id="bg-layer" aria-hidden="true">
  <div class="blossom-tree" id="blossom-tree"></div>
  <div id="petal-floor"></div>
</div>

<a class="back-link" href="/home">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    back
  </a>

<div class="page">

  <!-- recent scrobbles -->
  <div class="section-label centered">recent scrobbles</div>
  <div id="now-playing-wrap"></div>
  <div class="slider-wrap">
    <div class="slider" id="slider">
      <!-- skeletons while loading -->
      <div class="skeleton skeleton-scrobble"></div>
      <div class="skeleton skeleton-scrobble"></div>
      <div class="skeleton skeleton-scrobble"></div>
      <div class="skeleton skeleton-scrobble"></div>
      <div class="skeleton skeleton-scrobble"></div>
      <div class="skeleton skeleton-scrobble"></div>
    </div>
  </div>

  <!-- top artists + top tracks -->
  <div class="cols">
    <div>
      <div class="section-label">top artists · this month</div>
      <div class="top-list" id="top-artists">
        <div class="skeleton skeleton-item"></div>
        <div class="skeleton skeleton-item"></div>
        <div class="skeleton skeleton-item"></div>
        <div class="skeleton skeleton-item"></div>
        <div class="skeleton skeleton-item"></div>
      </div>
    </div>
    <div>
      <div class="section-label">top tracks · this month</div>
      <div class="top-list" id="top-tracks">
        <div class="skeleton skeleton-item"></div>
        <div class="skeleton skeleton-item"></div>
        <div class="skeleton skeleton-item"></div>
        <div class="skeleton skeleton-item"></div>
        <div class="skeleton skeleton-item"></div>
      </div>
    </div>
  </div>

</div>

<script>
  const API = 'https://api.satos.cc';

  function timeAgo(ts) {
    if (!ts) return '';
    const diff = Date.now() - ts;
    const m = Math.floor(diff / 60000);
    if (m < 1)  return 'just now';
    if (m < 60) return `${m}m ago`;
    const h = Math.floor(m / 60);
    if (h < 24) return `${h}h ago`;
    return `${Math.floor(h / 24)}d ago`;
  }

  function artImg(src, cls, alt, initial) {
    if (src && !src.includes('2a96cbd8b46e442fc41c2b86b821562f') && src.trim() !== '') {
      return `<img class="${cls}" src="${src}" alt="${alt}" loading="lazy">`;
    }
    const letter = initial ? initial.charAt(0).toUpperCase() : '♪';
    return `<div class="${cls}-placeholder" style="font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:var(--text-dim)">${letter}</div>`;
  }

  // ── recent scrobbles ──────────────────────────────────────────
  async function loadRecent() {
    const res   = await fetch(`${API}/music/recent`);
    const tracks = await res.json();
    const slider = document.getElementById('slider');
    const npWrap = document.getElementById('now-playing-wrap');

    const nowPlaying = tracks.find(t => t.nowPlaying);
    if (nowPlaying) {
      npWrap.innerHTML = `
        <div class="now-playing-pill">
          <span class="now-playing-dot"></span>
          now playing — ${nowPlaying.name}
        </div>`;
    }

    slider.innerHTML = tracks.map(t => `
      <div class="scrobble-card${t.nowPlaying ? ' now' : ''}">
        ${artImg(t.image, 'scrobble-art', t.name, t.name)}
        <div class="scrobble-info">
          <div class="scrobble-name">${t.name}</div>
          <div class="scrobble-artist">${t.artist}</div>
          <div class="scrobble-time">${t.nowPlaying ? '▶ now playing' : timeAgo(t.date)}</div>
        </div>
      </div>
    `).join('');
  }

  // ── top artists ───────────────────────────────────────────────
  async function loadTopArtists() {
    const res     = await fetch(`${API}/music/top-artists`);
    const artists = await res.json();
    document.getElementById('top-artists').innerHTML = artists.map((a, i) => `
      <a class="top-item" href="${a.url}" target="_blank" rel="noopener">
        <span class="top-rank">${i + 1}</span>
        ${artImg(a.image, 'top-art', a.name, a.name)}
        <div class="top-info">
          <div class="top-name">${a.name}</div>
        </div>
        <div class="top-plays">${a.plays.toLocaleString()}<span>plays</span></div>
      </a>
    `).join('');
  }

  // ── top tracks ────────────────────────────────────────────────
  async function loadTopTracks() {
    const res    = await fetch(`${API}/music/top-tracks`);
    const tracks = await res.json();
    document.getElementById('top-tracks').innerHTML = tracks.map((t, i) => `
      <a class="top-item" href="${t.url}" target="_blank" rel="noopener">
        <span class="top-rank">${i + 1}</span>
        ${artImg(t.image, 'top-art', t.name, t.name)}
        <div class="top-info">
          <div class="top-name">${t.name}</div>
          <div class="top-sub">${t.artist}</div>
        </div>
        <div class="top-plays">${t.plays.toLocaleString()}<span>plays</span></div>
      </a>
    `).join('');
  }

  // load all, refresh recent every 30s
  loadRecent();
  loadTopArtists();
  loadTopTracks();
  setInterval(loadRecent, 30000);

  // ── scroll wheel → horizontal scroll on slider ────────────────
  const sliderEl = document.getElementById('slider');
  sliderEl.addEventListener('wheel', (e) => {
    if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
      e.preventDefault();
      sliderEl.scrollLeft += e.deltaY;
    }
  }, { passive: false });

  // ── keyboard nav ──────────────────────────────────────────────
  const NAV = { home:'/home', japan:'/jp', music:'/music', anime:'/anime', github:'/git', movies:'/movies', socials:'/' };
  const MAX_LEN = Math.max(...Object.keys(NAV).map(k => k.length));
  let navBuffer = '';
  document.addEventListener('keydown', (e) => {
    if (e.metaKey || e.ctrlKey || e.altKey || e.key.length !== 1) return;
    navBuffer += e.key.toLowerCase();
    if (navBuffer.length > MAX_LEN) navBuffer = navBuffer.slice(-MAX_LEN);
    for (const [word, url] of Object.entries(NAV)) {
      if (navBuffer.endsWith(word)) { window.location.href = url; return; }
    }
  });

  // ── cherry blossom tree ───────────────────────────────────────
  const treeEl = document.getElementById('blossom-tree');
  const GRID_W = 58, GRID_H = 42;
  let grid, blossomCells;

  function makeGrid() {
    const g = [];
    for (let y = 0; y < GRID_H; y++) g.push(new Array(GRID_W).fill(' '));
    return g;
  }

  function setCell(x, y, ch, cls) {
    if (x < 0 || x >= GRID_W || y < 0 || y >= GRID_H) return;
    const existing = grid[y][x];
    if (typeof existing === 'string' && existing.includes('blossom')) return;
    grid[y][x] = cls ? `<span class="${cls}">${ch}</span>` : ch;
    if (cls && cls.startsWith('blossom')) blossomCells.push({ x, y });
  }

  let rngSeed = 137;
  function rand() {
    rngSeed = (rngSeed * 1664525 + 1013904223) & 0xffffffff;
    return (rngSeed >>> 0) / 0xffffffff;
  }

  function drawBranch(x, y, dx, dy, len, cls) {
    for (let i = 0; i < len; i++) {
      const nx = Math.round(x + dx * i), ny = Math.round(y + dy * i);
      let ch;
      if (Math.abs(dx) < 0.1)      ch = '|';
      else if (Math.abs(dy) < 0.1) ch = '_';
      else if (dx > 0 && dy < 0)   ch = '/';
      else if (dx < 0 && dy < 0)   ch = '\\';
      else if (dx > 0 && dy > 0)   ch = '\\';
      else                          ch = '/';
      setCell(nx, ny, ch, cls);
    }
  }

  function placeBlossom(cx, cy, r) {
    const offsets = [];
    for (let ly = -r; ly <= r; ly++)
      for (let lx = -r * 2; lx <= r * 2; lx++) {
        const dist = Math.sqrt((lx / (r * 2.1)) ** 2 + (ly / (r * 0.85)) ** 2);
        if (dist <= 1) offsets.push([lx, ly]);
      }
    for (const [lx, ly] of offsets) {
      if (rand() < 0.72) {
        let cls, ch;
        const v = rand();
        if (v < 0.15)      { cls = 'blossom-deep'; ch = rand() < 0.5 ? '*' : 'o'; }
        else if (v < 0.55) { cls = 'blossom';      ch = rand() < 0.4 ? '*' : rand() < 0.5 ? '.' : 'o'; }
        else               { cls = 'blossom-pale';  ch = rand() < 0.6 ? '.' : '*'; }
        setCell(cx + lx, cy + ly, ch, cls);
      }
    }
  }

  function initTree() {
    rngSeed = 137; grid = makeGrid(); blossomCells = [];
    const trunkBaseX = 18, trunkBaseY = GRID_H - 1, trunkHeight = 22;
    for (let i = 0; i < trunkHeight; i++) {
      const t = i / trunkHeight, wobble = Math.round(t * t * 2);
      const x = trunkBaseX + wobble, y = trunkBaseY - i;
      setCell(x, y, wobble > 0 && i === trunkHeight - 1 ? '/' : '|', 'trunk');
      if (i < 8) setCell(x + 1, y, '|', 'trunk');
      if (i < 4) setCell(x - 1, y, '|', 'root');
    }
    const rx = trunkBaseX, ry = trunkBaseY;
    for (let i = 1; i <= 5; i++) { setCell(rx - i, ry, '\\', 'root'); setCell(rx + 1 + i, ry, '/', 'root'); }
    setCell(rx - 6, ry, '_', 'root'); setCell(rx + 7, ry, '_', 'root');
    for (let i = 1; i <= 3; i++) { setCell(rx - i, ry - 1, '\\', 'root'); setCell(rx + 1 + i, ry - 1, '/', 'root'); }
    const tipX = trunkBaseX + 2, tipY = trunkBaseY - trunkHeight;
    const scaffolds = [
      { sx: -1, sy: 6,  angle: 145, len: 13 }, { sx: -1, sy: 10, angle: 155, len: 10 },
      { sx: 2,  sy: 5,  angle: 35,  len: 14 }, { sx: 2,  sy: 9,  angle: 25,  len: 11 },
      { sx: 1,  sy: 0,  angle: 100, len: 9  }, { sx: 1,  sy: 0,  angle: 80,  len: 9  },
      { sx: 0,  sy: 2,  angle: 120, len: 8  }, { sx: 2,  sy: 2,  angle: 60,  len: 8  },
      { sx: 0,  sy: 7,  angle: 130, len: 7  }, { sx: 2,  sy: 7,  angle: 50,  len: 7  },
    ];
    const branchTips = [];
    for (const sc of scaffolds) {
      const startX = tipX + sc.sx, startY = tipY + sc.sy;
      const rad = (sc.angle * Math.PI) / 180, dx = Math.cos(rad), dy = -Math.sin(rad);
      drawBranch(startX, startY, dx, dy, sc.len, sc.len >= 11 ? 'branch' : 'branch-thin');
      branchTips.push({ x: Math.round(startX + dx * sc.len), y: Math.round(startY + dy * sc.len), r: Math.floor(sc.len / 3.2) + 2 });
      for (let s = 0; s < 2; s++) {
        if (rand() < 0.65) {
          const split = 0.4 + rand() * 0.4;
          const bx = Math.round(startX + dx * sc.len * split), by = Math.round(startY + dy * sc.len * split);
          const spread = (rand() < 0.5 ? 1 : -1) * (25 + rand() * 30);
          const brad = ((sc.angle + spread) * Math.PI) / 180;
          const subLen = Math.floor(sc.len * (0.4 + rand() * 0.3));
          drawBranch(bx, by, Math.cos(brad), -Math.sin(brad), subLen, 'branch-thin');
          branchTips.push({ x: Math.round(bx + Math.cos(brad) * subLen), y: Math.round(by - Math.sin(brad) * subLen), r: 2 });
        }
      }
    }
    for (const tip of branchTips) placeBlossom(tip.x, tip.y, tip.r);
    for (let pass = 0; pass < 6; pass++) {
      placeBlossom(tipX + Math.round((rand() - 0.45) * 22), tipY - Math.round(rand() * 8), 3 + Math.floor(rand() * 3));
    }
  }

  initTree();
  treeEl.innerHTML = grid.map(r => r.join('')).join('\n');

  // ── drifting petals ───────────────────────────────────────────
  const PETAL_CHARS  = ['*', '.', 'o', "'", ','];
  const PETAL_COUNT  = 55;
  const PETAL_COLORS = ['hsl(345,100%,88%)','hsl(350,100%,82%)','hsl(340,100%,78%)','hsl(355,100%,92%)','hsl(320,80%,85%)'];

  function getBlossomOrigin() {
    if (!blossomCells.length) return null;
    const cell = blossomCells[Math.floor(Math.random() * blossomCells.length)];
    const rect = treeEl.getBoundingClientRect();
    return { x: rect.left + cell.x * 7.8 + (Math.random() - 0.5) * 20, y: rect.top + cell.y * 14.95 + (Math.random() - 0.5) * 14 };
  }

  const floorEl = document.getElementById('petal-floor');
  const COL_W = 18, MAX_PILE = 6;
  const floorCols = {};

  function getFloorCol(x) {
    const idx = Math.floor(x / COL_W);
    if (!floorCols[idx]) floorCols[idx] = { rows: [], baseX: idx * COL_W };
    return floorCols[idx];
  }

  function makeRowSpans(color) {
    const count = 1 + Math.floor(Math.random() * 4), spans = [];
    for (let i = 0; i < count; i++) {
      const s = document.createElement('span');
      s.className = 'floor-petal';
      s.textContent = PETAL_CHARS[Math.floor(Math.random() * PETAL_CHARS.length)];
      s.style.cssText = `font-size:${8 + Math.random() * 8}px;color:hsl(${330 + Math.random() * 30},90%,${75 + Math.random() * 18}%);opacity:0.85;`;
      spans.push(s);
    }
    return spans;
  }

  function landPetal(x, color) {
    const col = getFloorCol(x);
    if (col.rows.length >= MAX_PILE) return;
    const rowEl = document.createElement('div');
    rowEl.style.cssText = 'display:flex;align-items:flex-end;justify-content:center;line-height:1;';
    makeRowSpans(color).forEach(s => rowEl.appendChild(s));
    let colEl = floorEl.querySelector(`[data-col="${Math.floor(x / COL_W)}"]`);
    if (!colEl) {
      colEl = document.createElement('div');
      colEl.className = 'floor-col'; colEl.dataset.col = Math.floor(x / COL_W);
      colEl.style.left  = (col.baseX + (Math.random() - 0.5) * COL_W * 0.6) + 'px';
      colEl.style.width = (COL_W + Math.floor(Math.random() * 8)) + 'px';
      floorEl.appendChild(colEl);
    }
    colEl.appendChild(rowEl);
    col.rows.push({ el: rowEl, age: 0 });
  }

  setInterval(() => {
    for (const idx of Object.keys(floorCols)) {
      const col = floorCols[idx];
      if (!col.rows.length) continue;
      col.rows.forEach(r => r.age++);
      const bottom = col.rows[0];
      if (bottom && bottom.age > 24) {
        bottom.el.style.transition = 'opacity 3s ease-out'; bottom.el.style.opacity = '0';
        setTimeout(() => bottom.el.remove(), 3000);
        col.rows.shift();
      }
    }
  }, 8000);

  function spawnPetal(initialDelay) {
    const el = document.createElement('span');
    el.className = 'petal';
    el.textContent = PETAL_CHARS[Math.floor(Math.random() * PETAL_CHARS.length)];
    function launch(origin) {
      if (origin) { el.style.left = origin.x + 'px'; el.style.top = origin.y + 'px'; }
      else { el.style.left = (Math.random() * window.innerWidth * 0.18) + 'px'; el.style.top = (Math.random() * window.innerHeight * 0.75) + 'px'; }
      const startX = parseFloat(el.style.left);
      const driftX = window.innerWidth * (0.55 + Math.random() * 0.55);
      const driftY = window.innerHeight * (0.05 + Math.random() * 0.6);
      const rotStart = (Math.random() - 0.5) * 40, rotEnd = rotStart + (Math.random() - 0.5) * 200;
      const duration = 7000 + Math.random() * 12000;
      const opacity = 0.55 + Math.random() * 0.45;
      const color = PETAL_COLORS[Math.floor(Math.random() * PETAL_COLORS.length)];
      el.style.setProperty('--drift-x', driftX + 'px'); el.style.setProperty('--drift-y', driftY + 'px');
      el.style.setProperty('--rot-start', rotStart + 'deg'); el.style.setProperty('--rot-end', rotEnd + 'deg');
      el.style.setProperty('--petal-opacity', opacity);
      el.style.animationDuration = duration + 'ms'; el.style.animationDelay = (initialDelay ?? 0) + 'ms';
      el.style.fontSize = (10 + Math.random() * 5) + 'px'; el.style.color = color;
      el.style.animationName = 'none'; void el.offsetWidth; el.style.animationName = 'drift';
      el.addEventListener('animationend', () => {
        if (driftY > window.innerHeight * 0.3 && Math.random() < 0.35) { const lx = startX + driftX; if (lx >= 0 && lx <= window.innerWidth) landPetal(lx, color); }
        el.style.animationDelay = '0ms';
        setTimeout(() => launch(getBlossomOrigin()), 200 + Math.random() * 1800);
      }, { once: true });
    }
    document.getElementById('bg-layer').appendChild(el);
    launch(getBlossomOrigin());
  }

  for (let i = 0; i < PETAL_COUNT; i++) spawnPetal(i < 12 ? -(Math.random() * 9000) : Math.random() * 6000);

  setTimeout(() => {
    const rect = treeEl.getBoundingClientRect();
    const cx = rect.left + rect.width * 0.35, spread = rect.width * 1.1;
    for (let i = 0; i < 38; i++) {
      const u1 = Math.random(), u2 = Math.random();
      const gauss = Math.sqrt(-2 * Math.log(u1 + 0.0001)) * Math.cos(2 * Math.PI * u2);
      const x = cx + gauss * (spread * 0.3) + Math.random() * spread * 0.25;
      if (x < 0 || x > window.innerWidth) continue;
      const col = getFloorCol(x);
      if (col.rows.length >= 3) continue;
      const color = PETAL_COLORS[Math.floor(Math.random() * PETAL_COLORS.length)];
      const rowEl = document.createElement('div');
      rowEl.style.cssText = 'display:flex;align-items:flex-end;justify-content:center;line-height:1;';
      makeRowSpans(color).forEach(s => rowEl.appendChild(s));
      let colEl = floorEl.querySelector(`[data-col="${Math.floor(x / COL_W)}"]`);
      if (!colEl) {
        colEl = document.createElement('div'); colEl.className = 'floor-col'; colEl.dataset.col = Math.floor(x / COL_W);
        colEl.style.left = (col.baseX + (Math.random() - 0.5) * COL_W * 0.6) + 'px';
        colEl.style.width = (COL_W + Math.floor(Math.random() * 8)) + 'px';
        floorEl.appendChild(colEl);
      }
      colEl.appendChild(rowEl);
      col.rows.push({ el: rowEl, age: Math.floor(Math.random() * 8) });
    }
  }, 100);
</script>
