<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>satori / music</title>
<link rel="icon" href="https://segs.lol/IEPPV1.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:          #0a0a0c;
    --card:        #111114;
    --line:        rgba(255,255,255,0.08);
    --line-strong: rgba(255,255,255,0.22);
    --glow:        rgba(255,255,255,0.06);
    --glow-strong: rgba(255,255,255,0.14);
    --text:        #f2f2f0;
    --text-dim:    #8a8a8f;
    --text-dimmer: #55555c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  body::before {
    content: "";
    position: fixed; inset: 0;
    background-image:
      radial-gradient(circle at 15% 30%, rgba(255,255,255,0.018), transparent 50%),
      radial-gradient(circle at 85% 70%, rgba(255,255,255,0.012), transparent 40%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── layout ── */
  .page {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 80px 24px 80px;
  }

  /* ── back link ── */
  .back-link {
    position: fixed;
    top: 24px;
    left: 24px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
    color: var(--text-dimmer);
    font-size: 12px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: color 0.2s;
    z-index: 10;
  }
  .back-link:hover { color: var(--text-dim); }
  .back-link svg { width: 12px; height: 12px; }

  /* ── section headers ── */
  .section-label {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dimmer);
    margin-bottom: 14px;
  }
  .section-label.centered { text-align: center; }

  /* ── now playing pill ── */
  .now-playing-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 4px 10px 4px 8px;
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 14px;
  }
  .now-playing-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #fff;
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.75); }
  }

  /* ── recent scrobbles slider ── */
  .slider-wrap {
    position: relative;
    margin-bottom: 52px;
  }

  .slider {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    overflow-y: visible;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 4px;
    justify-content: center;
  }
  .slider::-webkit-scrollbar { display: none; }

  .scrobble-card {
    position: relative;
    flex: 0 0 88px;
    width: 88px;
    height: 88px;
    scroll-snap-align: start;
    border-radius: 12px;
    overflow: visible;
    cursor: default;
    z-index: 1;
  }
  .scrobble-card:hover { z-index: 10; }

  .scrobble-card.now .scrobble-art,
  .scrobble-card.now .scrobble-art-placeholder {
    box-shadow: 0 0 0 2px rgba(255,255,255,0.28);
  }

  .scrobble-art {
    width: 88px;
    height: 88px;
    border-radius: 12px;
    object-fit: cover;
    display: block;
    background: #1a1a1e;
  }
  .scrobble-art-placeholder {
    width: 88px;
    height: 88px;
    border-radius: 12px;
    background: #1a1a1e;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dimmer);
    font-size: 24px;
  }

  .scrobble-info {
    position: absolute;
    top: 0;
    left: 88px;
    height: 88px;
    width: 160px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 14px;
    background: rgba(14,14,18,0.82);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--line-strong);
    border-left: none;
    border-radius: 0 12px 12px 0;
    opacity: 0;
    transform: translateX(-8px);
    transition: opacity 0.2s ease, transform 0.2s ease;
    pointer-events: none;
  }
  .scrobble-card:hover .scrobble-info {
    opacity: 1;
    transform: translateX(0);
  }

  .scrobble-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
  }
  .scrobble-artist {
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .scrobble-time {
    font-size: 10px;
    color: var(--text-dimmer);
    margin-top: 4px;
  }

  .slider-wrap::after {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 48px;
    background: linear-gradient(to right, transparent, var(--bg));
    pointer-events: none;
    z-index: 0;
  }

  /* ── two column grid ── */
  .cols {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 120px;
    max-width: 680px;
    margin: 0 auto;
  }
  @media (max-width: 600px) {
    .cols { grid-template-columns: 1fr; }
  }

  .cols > div > .section-label { text-align: center; }

  /* ── top list cards ── */
  .top-list {
    display: flex;
    flex-direction: column;
    gap: 22px;
  }

  .top-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 7px 10px;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.2s, background 0.2s, transform 0.2s;
  }
  .top-item:hover {
    border-color: var(--line-strong);
    background: #141418;
    transform: translateX(3px);
  }

  .top-rank {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-dimmer);
    width: 14px;
    text-align: center;
    flex-shrink: 0;
  }

  .top-art {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    object-fit: cover;
    background: #1a1a1e;
    flex-shrink: 0;
  }
  .top-art-placeholder {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    background: #1a1a1e;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    color: var(--text-dimmer);
  }

  .top-info {
    flex: 1;
    min-width: 0;
  }
  .top-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .top-sub {
    font-size: 10px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 1px;
  }

  .top-plays {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dimmer);
    flex-shrink: 0;
    text-align: right;
  }
  .top-plays span {
    display: block;
    font-size: 9px;
    font-weight: 400;
    color: var(--text-dimmer);
  }

  /* ── skeleton loader ── */
  .skeleton {
    background: linear-gradient(90deg, #1a1a1e 25%, #222226 50%, #1a1a1e 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 8px;
  }
  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .skeleton-scrobble {
    flex: 0 0 88px;
    width: 88px;
    height: 88px;
    border-radius: 12px;
  }
  .skeleton-item {
    height: 48px;
    border-radius: 10px;
  }
</style>
</head>
<body>
<a class="back-link" href="/home">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    back
  </a>

<div class="page">

  <!-- recent scrobbles -->
  <div class="section-label centered">recent scrobbles</div>
  <div id="now-playing-wrap"></div>
  <div class="slider-wrap">
    <div class="slider" id="slider">
      <!-- skeletons while loading -->
      <div class="skeleton skeleton-scrobble"></div>
      <div class="skeleton skeleton-scrobble"></div>
      <div class="skeleton skeleton-scrobble"></div>
      <div class="skeleton skeleton-scrobble"></div>
      <div class="skeleton skeleton-scrobble"></div>
      <div class="skeleton skeleton-scrobble"></div>
    </div>
  </div>

  <!-- top artists + top tracks -->
  <div class="cols">
    <div>
      <div class="section-label">top artists · this month</div>
      <div class="top-list" id="top-artists">
        <div class="skeleton skeleton-item"></div>
        <div class="skeleton skeleton-item"></div>
        <div class="skeleton skeleton-item"></div>
        <div class="skeleton skeleton-item"></div>
        <div class="skeleton skeleton-item"></div>
      </div>
    </div>
    <div>
      <div class="section-label">top tracks · this month</div>
      <div class="top-list" id="top-tracks">
        <div class="skeleton skeleton-item"></div>
        <div class="skeleton skeleton-item"></div>
        <div class="skeleton skeleton-item"></div>
        <div class="skeleton skeleton-item"></div>
        <div class="skeleton skeleton-item"></div>
      </div>
    </div>
  </div>

</div>

<script>
  const API = 'https://api.satos.cc';

  function timeAgo(ts) {
    if (!ts) return '';
    const diff = Date.now() - ts;
    const m = Math.floor(diff / 60000);
    if (m < 1)  return 'just now';
    if (m < 60) return `${m}m ago`;
    const h = Math.floor(m / 60);
    if (h < 24) return `${h}h ago`;
    return `${Math.floor(h / 24)}d ago`;
  }

  function artImg(src, cls, alt) {
    if (src && !src.includes('2a96cbd8b46e442fc41c2b86b821562f')) {
      return `<img class="${cls}" src="${src}" alt="${alt}" loading="lazy">`;
    }
    return `<div class="${cls}-placeholder">♪</div>`;
  }

  // ── recent scrobbles ──────────────────────────────────────────
  async function loadRecent() {
    const res   = await fetch(`${API}/music/recent`);
    const tracks = await res.json();
    const slider = document.getElementById('slider');
    const npWrap = document.getElementById('now-playing-wrap');

    const nowPlaying = tracks.find(t => t.nowPlaying);
    if (nowPlaying) {
      npWrap.innerHTML = `
        <div class="now-playing-pill">
          <span class="now-playing-dot"></span>
          now playing — ${nowPlaying.name}
        </div>`;
    }

    slider.innerHTML = tracks.map(t => `
      <div class="scrobble-card${t.nowPlaying ? ' now' : ''}">
        ${artImg(t.image, 'scrobble-art', t.name)}
        <div class="scrobble-info">
          <div class="scrobble-name">${t.name}</div>
          <div class="scrobble-artist">${t.artist}</div>
          <div class="scrobble-time">${t.nowPlaying ? '▶ now playing' : timeAgo(t.date)}</div>
        </div>
      </div>
    `).join('');
  }

  // ── top artists ───────────────────────────────────────────────
  async function loadTopArtists() {
    const res     = await fetch(`${API}/music/top-artists`);
    const artists = await res.json();
    document.getElementById('top-artists').innerHTML = artists.map((a, i) => `
      <a class="top-item" href="${a.url}" target="_blank" rel="noopener">
        <span class="top-rank">${i + 1}</span>
        ${artImg(a.image, 'top-art', a.name)}
        <div class="top-info">
          <div class="top-name">${a.name}</div>
        </div>
        <div class="top-plays">${a.plays.toLocaleString()}<span>plays</span></div>
      </a>
    `).join('');
  }

  // ── top tracks ────────────────────────────────────────────────
  async function loadTopTracks() {
    const res    = await fetch(`${API}/music/top-tracks`);
    const tracks = await res.json();
    document.getElementById('top-tracks').innerHTML = tracks.map((t, i) => `
      <a class="top-item" href="${t.url}" target="_blank" rel="noopener">
        <span class="top-rank">${i + 1}</span>
        ${artImg(t.image, 'top-art', t.name)}
        <div class="top-info">
          <div class="top-name">${t.name}</div>
          <div class="top-sub">${t.artist}</div>
        </div>
        <div class="top-plays">${t.plays.toLocaleString()}<span>plays</span></div>
      </a>
    `).join('');
  }

  // load all, refresh recent every 30s
  loadRecent();
  loadTopArtists();
  loadTopTracks();
  setInterval(loadRecent, 30000);

  // ── keyboard nav ──────────────────────────────────────────────
  const NAV = { home:'/home', japan:'/jp', music:'/music', anime:'/anime', github:'/git', movies:'/movies', socials:'/' };
  const MAX_LEN = Math.max(...Object.keys(NAV).map(k => k.length));
  let navBuffer = '';
  document.addEventListener('keydown', (e) => {
    if (e.metaKey || e.ctrlKey || e.altKey || e.key.length !== 1) return;
    navBuffer += e.key.toLowerCase();
    if (navBuffer.length > MAX_LEN) navBuffer = navBuffer.slice(-MAX_LEN);
    for (const [word, url] of Object.entries(NAV)) {
      if (navBuffer.endsWith(word)) { window.location.href = url; return; }
    }
  });
</script>
</body>
</html>
