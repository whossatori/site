<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>satori / home</title>
<link rel="icon" href="https://segs.lol/IEPPV1.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0c;
    --card: #111114;
    --line: rgba(255,255,255,0.08);
    --line-strong: rgba(255,255,255,0.22);
    --glow: rgba(255,255,255,0.06);
    --glow-strong: rgba(255,255,255,0.14);
    --text: #f2f2f0;
    --text-dim: #8a8a8f;
    --text-dimmer: #55555c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
  }

  body {
    display: grid;
    place-items: center;
    min-height: 100vh;
    padding: 40px 20px;
  }

  body::before {
    content: "";
    position: fixed; inset: 0;
    background-image:
      radial-gradient(circle at 15% 50%, rgba(255,182,193,0.03), transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(255,255,255,0.015), transparent 40%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── cherry blossom tree ── */
  .blossom-tree {
    position: fixed;
    left: -4px;
    bottom: 0;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    line-height: 1.15;
    letter-spacing: 0;
    white-space: pre;
    pointer-events: none;
    user-select: none;
    z-index: 3;
    opacity: 0.90;
  }

  .blossom-tree .trunk       { color: #6b4c36; }
  .blossom-tree .branch      { color: #8a6848; }
  .blossom-tree .branch-thin { color: #7a5a3e; }
  .blossom-tree .blossom     { color: #ffb7c5; text-shadow: 0 0 6px rgba(255,150,180,0.5); }
  .blossom-tree .blossom-deep{ color: #ff85a8; text-shadow: 0 0 8px rgba(255,100,160,0.6); }
  .blossom-tree .blossom-pale{ color: #ffd6e3; text-shadow: 0 0 4px rgba(255,180,210,0.4); }
  .blossom-tree .root        { color: #5a4030; }

  /* ── drifting petals ── */
  .petal {
    position: fixed;
    font-family: 'Courier New', monospace;
    pointer-events: none;
    user-select: none;
    z-index: 4;
    font-size: 13px;
    line-height: 1;
    will-change: transform, opacity;
    animation: drift linear forwards;
  }

  @keyframes drift {
    0%   { transform: translate(0, 0) rotate(var(--rot-start)); opacity: 0; }
    6%   { opacity: var(--petal-opacity); }
    90%  { opacity: calc(var(--petal-opacity) * 0.5); }
    100% { transform: translate(var(--drift-x), var(--drift-y)) rotate(var(--rot-end)); opacity: 0; }
  }

  /* ── petal floor ── */
  #petal-floor {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 0;          /* zero height — out of flow, won't affect grid */
    overflow: visible;
    pointer-events: none;
    user-select: none;
    z-index: 2;
    font-family: 'Courier New', monospace;
    line-height: 1.1;
  }

  .floor-col {
    position: absolute;
    bottom: 0;
    display: flex;
    flex-direction: column-reverse; /* stack upward */
    align-items: center;
  }

  .floor-petal {
    display: block;
    line-height: 1;
    transition: opacity 2s ease-out;
  }

  /* ── card ── */
  .stage {
    position: relative;
    perspective: 1000px;
    width: 100%;
    max-width: 400px;
    z-index: 5;
  }

  @media (max-width: 860px) {
    .blossom-tree { font-size: 10px; }
  }

  .card {
    background: linear-gradient(160deg, var(--card), #0d0d10);
    border: 1px solid var(--line);
    border-radius: 22px;
    padding: 36px 28px 28px;
    text-align: center;
    transform-style: preserve-3d;
    backface-visibility: hidden;
    transition: transform 0.15s ease-out, box-shadow 0.3s ease-out, border-color 0.3s ease-out;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.02) inset,
      0 0 26px -6px var(--glow),
      0 20px 60px -20px rgba(0,0,0,0.8);
  }

  .card.hovered {
    border-color: var(--line-strong);
    box-shadow:
      0 0 50px -2px var(--glow-strong),
      0 0 0 1px rgba(255,255,255,0.04) inset,
      0 25px 70px -20px rgba(0,0,0,0.9);
  }

  .card-inner { transform: translateZ(20px); backface-visibility: hidden; }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
    color: var(--text-dimmer);
    font-size: 12px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 28px;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--text-dim); }
  .back-link svg { width: 12px; height: 12px; }

  .cmd-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .cmd-list li {
    display: flex;
    align-items: baseline;
    border-radius: 10px;
    padding: 9px 12px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    border: 1px solid transparent;
  }

  .cmd-list li:hover,
  .cmd-list li.active {
    background: rgba(255,255,255,0.04);
    border-color: var(--line);
  }

  .cmd-list li.active .cmd-keyword { color: #fff; }

  .cmd-keyword {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: var(--text);
    min-width: 80px;
    text-align: left;
    transition: color 0.15s;
  }

  .cmd-sep   { color: var(--text-dimmer); margin: 0 12px; user-select: none; font-size: 13px; }
  .cmd-desc  { color: var(--text-dim); font-size: 13px; text-align: left; }

  .typed-ghost {
    margin-top: 22px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    color: var(--text-dimmer);
    letter-spacing: 0.08em;
    min-height: 20px;
    transition: color 0.15s;
  }
  .typed-ghost.no-match { color: #d98a8a; }

  @keyframes flash-out {
    0%   { opacity: 1; }
    60%  { opacity: 0.15; }
    100% { opacity: 0; }
  }
  .card.navigating { animation: flash-out 0.35s ease-out forwards; }
  @media (prefers-reduced-motion: reduce) { .card { transition: none !important; } }
</style>
</head>
<body>

<div class="blossom-tree" id="blossom-tree" aria-hidden="true"></div>
<div id="petal-floor" aria-hidden="true"></div>

<div class="stage" id="stage">
  <div class="card" id="card">
    <div class="card-inner">

      <a class="back-link" href="/">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        back
      </a>

      <ul class="cmd-list" id="cmd-list">
        <li data-cmd="japan"  data-url="/jp">
          <span class="cmd-keyword">japan</span>
          <span class="cmd-sep">—</span>
          <span class="cmd-desc">travel & places</span>
        </li>
        <li data-cmd="github" data-url="/git">
          <span class="cmd-keyword">github</span>
          <span class="cmd-sep">—</span>
          <span class="cmd-desc">code & projects</span>
        </li>
        <li data-cmd="anime"  data-url="/anime">
          <span class="cmd-keyword">anime</span>
          <span class="cmd-sep">—</span>
          <span class="cmd-desc">anime list</span>
        </li>
        <li data-cmd="movies" data-url="/movies">
          <span class="cmd-keyword">movies</span>
          <span class="cmd-sep">—</span>
          <span class="cmd-desc">film diary</span>
        </li>
        <li data-cmd="music"  data-url="/music">
          <span class="cmd-keyword">music</span>
          <span class="cmd-sep">—</span>
          <span class="cmd-desc">what i'm listening to</span>
        </li>
      </ul>

      <div class="typed-ghost" id="typed-ghost"></div>
    </div>
  </div>
</div>

<script>
// ── card tilt ──────────────────────────────────────────────────
const card  = document.getElementById('card');
const stage = document.getElementById('stage');
stage.addEventListener('mousemove', (e) => {
  const rect = card.getBoundingClientRect();
  const dx = ((e.clientX - rect.left) / rect.width  - 0.5) * 2;
  const dy = ((e.clientY - rect.top)  / rect.height - 0.5) * 2;
  card.style.transform = `rotateX(${-dy*6}deg) rotateY(${dx*6}deg) translateY(-6px) scale(1.008)`;
});
stage.addEventListener('mouseenter', () => card.classList.add('hovered'));
stage.addEventListener('mouseleave', () => {
  card.style.transform = 'rotateX(0deg) rotateY(0deg) translateY(0px) scale(1)';
  card.classList.remove('hovered');
});

// ── keypress routing ───────────────────────────────────────────
const COMMANDS = {
  japan: '/jp', github: '/git', anime: '/anime', movies: '/movies', music: '/music',
};
const items    = Array.from(document.querySelectorAll('#cmd-list li'));
const ghost    = document.getElementById('typed-ghost');
let keyBuffer  = '';
let clearTimer = null;

function resetBuffer() {
  keyBuffer = '';
  ghost.textContent = '';
  ghost.classList.remove('no-match');
  items.forEach(li => li.classList.remove('active'));
}
function navigate(url) {
  card.classList.add('navigating');
  setTimeout(() => { window.location.href = url; }, 320);
}
document.addEventListener('keydown', (e) => {
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  if (e.key === 'Escape') { resetBuffer(); return; }
  if (e.key === 'Backspace') { keyBuffer = keyBuffer.slice(0, -1); }
  else if (e.key.length === 1) { keyBuffer += e.key.toLowerCase(); }
  else return;

  clearTimeout(clearTimer);
  clearTimer = setTimeout(resetBuffer, 1200);
  ghost.textContent = keyBuffer;

  if (COMMANDS[keyBuffer]) { navigate(COMMANDS[keyBuffer]); return; }

  const matches = items.filter(li => li.dataset.cmd.startsWith(keyBuffer));
  items.forEach(li => li.classList.toggle('active', matches.includes(li)));
  if (matches.length === 0) {
    ghost.classList.add('no-match');
    clearTimeout(clearTimer);
    clearTimer = setTimeout(resetBuffer, 600);
  } else {
    ghost.classList.remove('no-match');
  }
});
items.forEach(li => li.addEventListener('click', () => navigate(li.dataset.url)));

// ── cherry blossom tree (cbonsai style, cherry blossom shaped) ──
const treeEl = document.getElementById('blossom-tree');

const GRID_W = 58;
const GRID_H = 42;

let grid, blossomCells;

function makeGrid() {
  const g = [];
  for (let y = 0; y < GRID_H; y++) g.push(new Array(GRID_W).fill(' '));
  return g;
}

function setCell(x, y, ch, cls) {
  if (x < 0 || x >= GRID_W || y < 0 || y >= GRID_H) return;
  // don't overwrite blossoms with branches
  const existing = grid[y][x];
  if (typeof existing === 'string' && existing.includes('blossom')) return;
  grid[y][x] = cls ? `<span class="${cls}">${ch}</span>` : ch;
  if (cls && cls.startsWith('blossom')) blossomCells.push({ x, y });
}

// Simple seeded RNG
let rngSeed = 137;
function rand() {
  rngSeed = (rngSeed * 1664525 + 1013904223) & 0xffffffff;
  return (rngSeed >>> 0) / 0xffffffff;
}

// Draw a straight segment from (x1,y1) toward direction using Bresenham-ish
function drawBranch(x, y, dx, dy, len, cls) {
  for (let i = 0; i < len; i++) {
    const nx = Math.round(x + dx * i);
    const ny = Math.round(y + dy * i);
    let ch;
    if (Math.abs(dx) < 0.1)      ch = '|';
    else if (Math.abs(dy) < 0.1) ch = '_';
    else if (dx > 0 && dy < 0)   ch = '/';
    else if (dx < 0 && dy < 0)   ch = '\\';
    else if (dx > 0 && dy > 0)   ch = '\\';
    else                          ch = '/';
    setCell(nx, ny, ch, cls);
  }
}

// Place a blossom cluster centred at (cx, cy) with radius r
function placeBlossom(cx, cy, r) {
  const offsets = [];
  for (let ly = -r; ly <= r; ly++) {
    for (let lx = -r * 2; lx <= r * 2; lx++) {
      // Oval shape — wider than tall, cherry blossom canopy
      const dist = Math.sqrt((lx / (r * 2.1)) ** 2 + (ly / (r * 0.85)) ** 2);
      if (dist <= 1) offsets.push([lx, ly]);
    }
  }
  for (const [lx, ly] of offsets) {
    if (rand() < 0.72) {
      let cls, ch;
      const v = rand();
      if (v < 0.15)      { cls = 'blossom-deep'; ch = rand() < 0.5 ? '*' : 'o'; }
      else if (v < 0.55) { cls = 'blossom';      ch = rand() < 0.4 ? '*' : rand() < 0.5 ? '.' : 'o'; }
      else               { cls = 'blossom-pale';  ch = rand() < 0.6 ? '.' : '*'; }
      setCell(cx + lx, cy + ly, ch, cls);
    }
  }
}

function initTree() {
  rngSeed = 137;
  grid = makeGrid();
  blossomCells = [];

  // ── Trunk ──
  // Starts at bottom-left, curves upward
  const trunkBaseX = 18;
  const trunkBaseY = GRID_H - 1;
  const trunkHeight = 22;

  // Main trunk — slight rightward curve at the top
  for (let i = 0; i < trunkHeight; i++) {
    const t = i / trunkHeight;
    const wobble = Math.round(t * t * 2); // curves right near top
    const x = trunkBaseX + wobble;
    const y = trunkBaseY - i;
    const ch = wobble > 0 && i === trunkHeight - 1 ? '/' : '|';
    setCell(x, y, ch, 'trunk');
    // Double-wide trunk at base
    if (i < 8) setCell(x + 1, y, ch, 'trunk');
    if (i < 4) setCell(x - 1, y, ch, 'root');
  }

  // ── Roots / base ──
  // Flared root lines at bottom
  const rx = trunkBaseX, ry = trunkBaseY;
  for (let i = 1; i <= 5; i++) {
    setCell(rx - i, ry, '\\', 'root');
    setCell(rx + 1 + i, ry, '/', 'root');
  }
  setCell(rx - 6, ry, '_', 'root');
  setCell(rx + 7, ry, '_', 'root');
  // Second root row
  for (let i = 1; i <= 3; i++) {
    setCell(rx - i, ry - 1, '\\', 'root');
    setCell(rx + 1 + i, ry - 1, '/', 'root');
  }

  // ── Main scaffold branches ──
  // These define the overall cherry blossom silhouette
  const tipX = trunkBaseX + 2;
  const tipY = trunkBaseY - trunkHeight;

  // Branch definitions: [startOffX, startOffY, angle°, length, subBranches]
  const scaffolds = [
    // Left large branch
    { sx: -1, sy: 6,  angle: 145, len: 13 },
    { sx: -1, sy: 10, angle: 155, len: 10 },
    // Right large branch
    { sx: 2,  sy: 5,  angle: 35,  len: 14 },
    { sx: 2,  sy: 9,  angle: 25,  len: 11 },
    // Top branches
    { sx: 1,  sy: 0,  angle: 100, len: 9  },
    { sx: 1,  sy: 0,  angle: 80,  len: 9  },
    { sx: 0,  sy: 2,  angle: 120, len: 8  },
    { sx: 2,  sy: 2,  angle: 60,  len: 8  },
    // Mid branches
    { sx: 0,  sy: 7,  angle: 130, len: 7  },
    { sx: 2,  sy: 7,  angle: 50,  len: 7  },
  ];

  const branchTips = [];
  for (const sc of scaffolds) {
    const startX = tipX + sc.sx;
    const startY = tipY + sc.sy;
    const rad    = (sc.angle * Math.PI) / 180;
    const dx     = Math.cos(rad);
    const dy     = -Math.sin(rad); // screen y is inverted

    // choose trunk or branch-thin based on length
    const cls = sc.len >= 11 ? 'branch' : 'branch-thin';
    drawBranch(startX, startY, dx, dy, sc.len, cls);

    const endX = Math.round(startX + dx * sc.len);
    const endY = Math.round(startY + dy * sc.len);
    branchTips.push({ x: endX, y: endY, r: Math.floor(sc.len / 3.2) + 2 });

    // Add 1–2 sub-branches off each scaffold
    for (let s = 0; s < 2; s++) {
      if (rand() < 0.65) {
        const split  = 0.4 + rand() * 0.4;
        const bx     = Math.round(startX + dx * sc.len * split);
        const by     = Math.round(startY + dy * sc.len * split);
        const spread = (rand() < 0.5 ? 1 : -1) * (25 + rand() * 30);
        const brad   = ((sc.angle + spread) * Math.PI) / 180;
        const subLen = Math.floor(sc.len * (0.4 + rand() * 0.3));
        drawBranch(bx, by, Math.cos(brad), -Math.sin(brad), subLen, 'branch-thin');
        const ex = Math.round(bx + Math.cos(brad) * subLen);
        const ey = Math.round(by - Math.sin(brad) * subLen);
        branchTips.push({ x: ex, y: ey, r: 2 });
      }
    }
  }

  // ── Blossom clusters at all tips ──
  for (const tip of branchTips) {
    placeBlossom(tip.x, tip.y, tip.r);
  }
  // Extra dense canopy fill in the upper region
  for (let pass = 0; pass < 6; pass++) {
    const cx = tipX + Math.round((rand() - 0.45) * 22);
    const cy = tipY - Math.round(rand() * 8);
    placeBlossom(cx, cy, 3 + Math.floor(rand() * 3));
  }
}

function renderTree() {
  treeEl.innerHTML = grid.map(r => r.join('')).join('\n');
}

initTree();
renderTree();



// ── drifting petal characters ──────────────────────────────────
const PETAL_CHARS  = ['*', '.', 'o', "'", ','];
const PETAL_COUNT  = 55;
const PETAL_COLORS = [
  'hsl(345,100%,88%)',
  'hsl(350,100%,82%)',
  'hsl(340,100%,78%)',
  'hsl(355,100%,92%)',
  'hsl(320, 80%,85%)',
];

function getBlossomOrigin() {
  if (!blossomCells.length) return null;
  const cell  = blossomCells[Math.floor(Math.random() * blossomCells.length)];
  const charW = 7.8;
  const charH = 14.95;
  const rect  = treeEl.getBoundingClientRect();
  return {
    x: rect.left + cell.x * charW + (Math.random() - 0.5) * 20,
    y: rect.top  + cell.y * charH + (Math.random() - 0.5) * 14,
  };
}

// ── petal floor ────────────────────────────────────────────────
// Divides the screen into columns; each column tracks a pile of
// landed petals that grow upward and slowly erode.

const floorEl   = document.getElementById('petal-floor');
const COL_W     = 18;          // px wide per column bucket
const MAX_PILE  = 7;           // max rows high a pile can grow
// Per-column state: array of { els: [DOM spans], age: number }
const cols      = {};

function getCol(x) {
  const idx = Math.floor(x / COL_W);
  if (!cols[idx]) cols[idx] = { rows: [], baseX: idx * COL_W };
  return cols[idx];
}

// Each "row" in a pile is a horizontal strip of 1–4 chars
// with random sizes, giving an uneven, natural look.
function makeRowSpans(color) {
  // 1–4 characters per row, each with its own size + slight hue shift
  const count = 1 + Math.floor(Math.random() * 4);
  const spans = [];
  for (let i = 0; i < count; i++) {
    const s    = document.createElement('span');
    s.className = 'floor-petal';
    s.textContent = PETAL_CHARS[Math.floor(Math.random() * PETAL_CHARS.length)];
    // size varies between 8px and 16px — wide range for naturalism
    const sz   = 8 + Math.random() * 8;
    // slight hue drift from the landing petal's color
    const hue  = 330 + Math.random() * 30;
    const lit  = 75 + Math.random() * 18;
    s.style.cssText = `font-size:${sz}px; color:hsl(${hue},90%,${lit}%); opacity:0.85;`;
    spans.push(s);
  }
  return spans;
}

function landPetal(x, color) {
  const col = getCol(x);

  if (col.rows.length >= MAX_PILE) {
    // Pile full — quietly drop this petal (floor stays capped)
    return;
  }

  // Build a wrapper div for this row
  const rowEl = document.createElement('div');
  rowEl.style.cssText = 'display:flex; align-items:flex-end; justify-content:center; line-height:1;';

  const spans = makeRowSpans(color);
  spans.forEach(s => rowEl.appendChild(s));

  // Position the column container if first row
  let colEl = floorEl.querySelector(`[data-col="${Math.floor(x / COL_W)}"]`);
  if (!colEl) {
    colEl = document.createElement('div');
    colEl.className = 'floor-col';
    colEl.dataset.col = Math.floor(x / COL_W);
    // Jitter the column's x slightly so piles don't look grid-perfect
    const jitter = (Math.random() - 0.5) * COL_W * 0.6;
    colEl.style.left  = (col.baseX + jitter) + 'px';
    // Vary the col width slightly too
    colEl.style.width = (COL_W + Math.floor(Math.random() * 8)) + 'px';
    floorEl.appendChild(colEl);
  }

  colEl.appendChild(rowEl);
  col.rows.push({ el: rowEl, age: 0 });
}

// Erosion: periodically age piles and remove oldest bottom row
function erodeFloor() {
  for (const idx of Object.keys(cols)) {
    const col = cols[idx];
    if (!col.rows.length) continue;

    // Age every row
    col.rows.forEach(r => r.age++);

    // Once a row is old enough, fade and remove the bottom one
    const bottom = col.rows[0];
    if (bottom && bottom.age > 18) {   // ~18 ticks ≈ 90s at 5s interval
      // Fade out then remove
      bottom.el.style.transition = 'opacity 3s ease-out';
      bottom.el.style.opacity = '0';
      setTimeout(() => {
        bottom.el.remove();
      }, 3000);
      col.rows.shift();
    }
  }
}

// Run erosion every 5 seconds
setInterval(erodeFloor, 5000);

// ── flying petals ──────────────────────────────────────────────
function spawnPetal(initialDelay) {
  const el  = document.createElement('span');
  el.className = 'petal';
  el.textContent = PETAL_CHARS[Math.floor(Math.random() * PETAL_CHARS.length)];

  function launch(origin) {
    if (origin) {
      el.style.left = origin.x + 'px';
      el.style.top  = origin.y + 'px';
    } else {
      el.style.left = (Math.random() * window.innerWidth * 0.18) + 'px';
      el.style.top  = (Math.random() * window.innerHeight * 0.75) + 'px';
    }

    const startX   = parseFloat(el.style.left);
    const driftX   = window.innerWidth * (0.55 + Math.random() * 0.55);
    const driftY   = window.innerHeight * (0.05 + Math.random() * 0.6);
    const rotStart = (Math.random() - 0.5) * 40;
    const rotEnd   = rotStart + (Math.random() - 0.5) * 200;
    const duration = 7000 + Math.random() * 12000;
    const opacity  = 0.55 + Math.random() * 0.45;
    const color    = PETAL_COLORS[Math.floor(Math.random() * PETAL_COLORS.length)];
    const size     = 10 + Math.random() * 5;

    el.style.setProperty('--drift-x',       driftX + 'px');
    el.style.setProperty('--drift-y',       driftY + 'px');
    el.style.setProperty('--rot-start',     rotStart + 'deg');
    el.style.setProperty('--rot-end',       rotEnd + 'deg');
    el.style.setProperty('--petal-opacity', opacity);
    el.style.animationDuration = duration + 'ms';
    el.style.animationDelay   = (initialDelay != null ? initialDelay : 0) + 'ms';
    el.style.fontSize = size + 'px';
    el.style.color    = color;
    el.style.animationName = 'none';
    void el.offsetWidth;
    el.style.animationName = 'drift';

    el.addEventListener('animationend', () => {
      // Only land petals that actually fell toward the floor
      // (driftY > 30% of screen height means it travelled downward significantly)
      if (driftY > window.innerHeight * 0.3) {
        const landX = startX + driftX;
        // Only land if it's still on-screen horizontally
        if (landX >= 0 && landX <= window.innerWidth) {
          landPetal(landX, color);
        }
      }

      el.style.animationDelay = '0ms';
      setTimeout(() => launch(getBlossomOrigin()), 200 + Math.random() * 1800);
    }, { once: true });
  }

  document.body.appendChild(el);
  launch(getBlossomOrigin());
  return el;
}

// Stagger initial spawns
for (let i = 0; i < PETAL_COUNT; i++) {
  const delay = i < 12
    ? -(Math.random() * 9000)
    : Math.random() * 6000;
  spawnPetal(delay);
}
</script>
