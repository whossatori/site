<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>satori / admin / uploader</title>
<link rel="icon" href="https://segs.lol/IEPPV1.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0c; --line: rgba(255,255,255,0.08);
    --text: #f2f2f0; --text-dim: #8a8a8f; --text-dimmer: #55555c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; visibility: hidden; }
  body::before {
    content: ""; position: fixed; inset: 0;
    background-image: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.025), transparent 40%), radial-gradient(circle at 80% 70%, rgba(255,255,255,0.02), transparent 40%);
    pointer-events: none;
  }
  .back-link {
    position: fixed; top: 24px; left: 24px;
    display: inline-flex; align-items: center; gap: 6px;
    text-decoration: none; color: var(--text-dimmer);
    font-size: 12px; letter-spacing: 0.04em; text-transform: uppercase;
    transition: color 0.2s; z-index: 10;
  }
  .back-link:hover { color: var(--text-dim); }
  .back-link svg { width: 12px; height: 12px; }
  .center {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 0;
    pointer-events: none; user-select: none;
  }
  .coming-soon {
    font-family: 'Space Grotesk', sans-serif; font-size: 13px;
    font-weight: 500; color: var(--text-dimmer); letter-spacing: 0.08em;
  }
</style>
</head>
<body>

<a class="back-link" href="/admin">
  <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
  back
</a>

<div class="center">
  <p class="coming-soon">uploader — coming soon...</p>
</div>

<script>
  const token = localStorage.getItem('admin_token');
  if (!token) {
    window.location.href = '/admin';
  } else {
    fetch('https://api.satos.cc/admin/config', {
      headers: { 'Authorization': 'Bearer ' + token }
    }).then(res => {
      if (res.status === 401) {
        localStorage.removeItem('admin_token');
        window.location.href = '/admin';
      } else {
        document.body.style.visibility = 'visible';
      }
    }).catch(() => { document.body.style.visibility = 'visible'; });
  }
</script>
</body>
</html>
